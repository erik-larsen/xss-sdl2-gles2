<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>xscreensaver</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden;
  }
  /* The canvas fills the window; the hack's own aspect is whatever
     size the driver requests (SDL resizes the backing store). */
  #canvas {
    display: block;
    width: 100vw; height: 100vh;
    border: 0; outline: none;
    background: #000;
    image-rendering: auto;
  }
  /* Minimal load veil; removed once the first frame is presented. */
  #veil {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000; color: #444;
    font: 14px/1.4 system-ui, sans-serif;
    transition: opacity .4s ease; z-index: 10;
  }
  #veil.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<canvas id="canvas" tabindex="-1"
        oncontextmenu="event.preventDefault()"></canvas>
<div id="veil"><span id="veiltext">loading\u2026</span></div>

<script>
  // The driver calls SDL_SetWindowTitle(); SDL routes that to
  // document.title, so the tab name becomes "xscreensaver: <hack>".
  var Module = {
    canvas: (function () { return document.getElementById('canvas'); })(),
    print: function (t) { console.log(t); },
    printErr: function (t) { console.warn(t); },
    setStatus: function (t) {
      var v = document.getElementById('veiltext');
      if (v) v.textContent = t || 'loading\u2026';
    },
    onRuntimeInitialized: function () {
      // Hide the veil shortly after the runtime starts; the first
      // frames are on their way.
      setTimeout(function () {
        var veil = document.getElementById('veil');
        if (veil) veil.classList.add('hidden');
      }, 300);
    }
  };
  window.onerror = function (msg) {
    var v = document.getElementById('veiltext');
    if (v) v.textContent = 'error \u2014 see console';
    console.error(msg);
  };
</script>
<!-- coi-serviceworker is intentionally NOT included: this build is
     single-threaded (no pthreads), so it needs no COOP/COEP headers
     and hosts from any static server, including GitHub Pages. -->
{{{ SCRIPT }}}
</body>
</html>
